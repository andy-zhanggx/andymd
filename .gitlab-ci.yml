# GitLab CI/CD for AndyMD
#
# AndyMD is a native macOS app and there is no macOS CI runner, so the .app/.dmg
# is built locally and attached to the release afterwards. This pipeline:
#   • every push / MR : typecheck + run the Vitest suite (Linux runner)
#   • on a v* tag      : create the GitLab Release (no binary yet)
#
# Then, locally, attach the installer:
#   pnpm tauri build && pnpm release:dmg
# (`scripts/release-dmg.mjs` uploads AndyMD_<ver>_<arch>.dmg to the Generic
# Package Registry and links it on the release.)

stages: [test, release]

default:
  image: node:22
  before_script:
    # corepack uses the pnpm version pinned in package.json's "packageManager".
    - corepack enable
    - pnpm install --frozen-lockfile

# ── Gate: typecheck + tests ──────────────────────────────────────────────────
test:
  stage: test
  script:
    - pnpm exec tsc -b          # real typecheck (root tsconfig uses project refs)
    - pnpm test                 # Vitest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ── Create the GitLab Release on a v* tag (the .dmg is attached locally) ──────
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  before_script: []   # release-cli image has no node/pnpm; skip the default
  script:
    - |
      release-cli create \
        --name "AndyMD ${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "AndyMD ${CI_COMMIT_TAG}. See CHANGELOG.md for release notes. The macOS .dmg is attached after a local build (no macOS CI runner): \`pnpm tauri build && pnpm release:dmg\`."
